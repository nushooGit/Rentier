[program:queue]
command=php /app/artisan queue:work --sleep=3 --tries=3 --max-time=3600
directory=/app
user=www-data
autostart=true
autorestart=true
numprocs=1
startsecs=1
stopasgroup=true
killasgroup=true
stopsignal=TERM
stopwaitsecs=3600
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
